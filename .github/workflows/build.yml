  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: copy README.md
        run: |
          cp README.md pyrxing
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pyrxing
          key: ${{ runner.os }}-${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pyrxing
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter $TARGET_PYTHON
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
          before-script-linux: |
            if command -v apk >/dev/null 2>&1; then
              echo "Using apk (Alpine)"
              apk add --no-cache build-base cmake g++ gcc musl-dev git ninja
            elif command -v apt-get >/dev/null 2>&1; then
              echo "Using apt-get (Ubuntu/Debian)"
              apt-get update
              apt-get install -y build-essential cmake g++ gcc git ninja-build
            elif command -v yum >/dev/null 2>&1; then
              echo "Using yum (CentOS/RHEL)"
              yum install -y cmake3 gcc-c++ ninja-build git
              ln -sf /usr/bin/cmake3 /usr/bin/cmake
            else
              echo "Unknown package manager"
              exit 1
            fi

            python -m pip install patchelf

